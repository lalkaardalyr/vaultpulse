# VaultPulse example configuration
# Copy this file to config.yaml and adjust values for your environment.

vault:
  # Vault server address (required)
  address: "http://127.0.0.1:8200"

  # Vault token — can also be set via VAULT_TOKEN environment variable
  token: "s.xxxxxxxxxxxxxxxx"

  # Optional: Vault namespace (Enterprise only)
  namespace: ""

  # Skip TLS verification (not recommended for production)
  tls_skip_verify: false

monitor:
  # List of secret paths to monitor for expiry
  paths:
    - "secret/data/myapp/db-password"
    - "secret/data/myapp/api-key"
    - "secret/data/shared/tls-cert"

  # How often to poll Vault for secret metadata (default: 1h)
  interval: 1h

alerts:
  # Days before expiry to trigger a WARNING alert (default: 14)
  warning_days: 14

  # Days before expiry to trigger a CRITICAL alert (default: 3)
  critical_days: 3

  # Slack incoming webhook URL (leave empty to disable)
  slack_webhook: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  # SMTP server for email alerts (leave empty to disable)
  # Format: host:port
  email_smtp: "smtp.example.com:587"

  # Recipient email address for alerts
  email_to: "ops-team@example.com"
