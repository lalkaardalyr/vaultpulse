vault:
  address: "https://vault.example.com"
  token: ""          # or set VAULT_TOKEN env var
  paths:
    - "secret/data/myapp/db"
    - "secret/data/myapp/api"

monitor:
  interval: "1h"
  warning_threshold: "72h"
  critical_threshold: "24h"

output:
  format: "table"    # table | json

alerts:
  threshold: "warning"  # info | warning | critical

notify:
  slack:
    webhook_url: ""   # https://hooks.slack.com/services/...

  pagerduty:
    integration_key: ""

  opsgenie:
    api_key: ""

  victorops:
    webhook_url: ""

  discord:
    webhook_url: ""

  teams:
    webhook_url: ""

  webhook:
    url: ""

  email:
    host: ""
    port: 587
    from: ""
    recipients: []

  sns:
    topic_arn: ""     # arn:aws:sns:<region>:<account-id>:<topic-name>
                      # AWS credentials resolved from environment / IAM role
